version: "3.8"

services:
  #Base de datos PostgresSQL
  postgres:
    image: postgres:16-alpine
    container_name: db_survey_form
    restart: unless-stopped
    environment:
      # Nombres exactos requeridos por la imagen oficial de PostgreSQL
      POSTGRES_DB: ${P_DB_NAME}
      POSTGRES_USER: ${P_DB_USER}
      POSTGRES_PASSWORD: ${P_DB_PASSWORD}
    ports:
      - "${P_DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${P_DB_USER} -d ${P_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  #Servidor Jenkins
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  jenkins_home:
